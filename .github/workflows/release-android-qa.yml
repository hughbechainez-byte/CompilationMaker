name: Release Android QA

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  emulator-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - uses: android-actions/setup-android@v3

      - name: Enable KVM for the hosted emulator
        run: |
          sudo chmod 666 /dev/kvm

      - name: Restore release signing key for instrumentation
        env:
          COMPILATIONMAKER_KEYSTORE_BASE64: ${{ secrets.COMPILATIONMAKER_KEYSTORE_BASE64 }}
        run: |
          test -n "$COMPILATIONMAKER_KEYSTORE_BASE64"
          echo "$COMPILATIONMAKER_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/compilationmaker-release.keystore"

      - name: Download exact release APK and fixture A
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || 'v0.17.6' }}
        run: |
          mkdir -p test-fixtures
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.apk' --dir test-fixtures
          mv "$(find test-fixtures -name '*.apk' | head -n1)" test-fixtures/release.apk
          curl --fail --location --output test-fixtures/compilation_test_video_A.mp4 \
            https://github.com/hughbechainez-byte/CompilationMaker/releases/download/v0.17.5/compilation-test-video-A.mp4

      - name: Build matching instrumentation APK
        env:
          COMPILATIONMAKER_KEYSTORE_PATH: ${{ runner.temp }}/compilationmaker-release.keystore
          COMPILATIONMAKER_STORE_PASSWORD: ${{ secrets.COMPILATIONMAKER_STORE_PASSWORD }}
          COMPILATIONMAKER_KEY_ALIAS: ${{ secrets.COMPILATIONMAKER_KEY_ALIAS }}
          COMPILATIONMAKER_KEY_PASSWORD: ${{ secrets.COMPILATIONMAKER_KEY_PASSWORD }}
        run: ./gradlew :app:assembleReleaseAndroidTest

      - name: Run deterministic picker test on API 35
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          script: bash tools/android-qa/run-release-picker-qa.sh test-fixtures/release.apk app/build/outputs/apk/androidTest/release/app-release-androidTest.apk test-fixtures/compilation_test_video_A.mp4 qa-artifacts

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-qa-artifacts
          path: qa-artifacts
