name: Release APK on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Restore release signing key
        env:
          COMPILATIONMAKER_KEYSTORE_BASE64: ${{ secrets.COMPILATIONMAKER_KEYSTORE_BASE64 }}
        run: |
          test -n "$COMPILATIONMAKER_KEYSTORE_BASE64"
          echo "$COMPILATIONMAKER_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/compilationmaker-release.keystore"

      - name: Build signed release APK
        env:
          COMPILATIONMAKER_KEYSTORE_PATH: ${{ runner.temp }}/compilationmaker-release.keystore
          COMPILATIONMAKER_STORE_PASSWORD: ${{ secrets.COMPILATIONMAKER_STORE_PASSWORD }}
          COMPILATIONMAKER_KEY_ALIAS: ${{ secrets.COMPILATIONMAKER_KEY_ALIAS }}
          COMPILATIONMAKER_KEY_PASSWORD: ${{ secrets.COMPILATIONMAKER_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease

      - name: Locate APK artifact
        id: artifact
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 2 -type f -name '*.apk' | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find app/build/outputs/apk -type f -name '*release*.apk' | sort | head -n 1)"
          fi
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK not found in app/build/outputs"
            echo "Contents of app/build/outputs/apk:" 
            find app/build/outputs/apk -type f -name '*.apk' 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort | tail -n 1)"
          "$APKSIGNER" verify --print-certs "$APK_PATH"
          mkdir -p dist
          cp "$APK_PATH" "dist/CompilationMaker-${TAG_NAME}.apk"
          echo "apk_path=dist/CompilationMaker-${TAG_NAME}.apk" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release with APK asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "CompilationMaker ${{ github.ref_name }}"
          artifacts: ${{ steps.artifact.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          makeLatest: true
          generateReleaseNotes: true
          body: |
            Test build. The signing certificate was rotated; installations signed by the old certificate must uninstall and reinstall before installing this release.
