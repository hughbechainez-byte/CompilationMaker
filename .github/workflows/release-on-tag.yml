name: Release APK on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          ./gradlew :app:assembleDebug
          ./gradlew :app:assembleRelease

      - name: Locate APK artifact
        id: artifact
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_PATH="$(find app/build/outputs -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK not found in app/build/outputs"
            echo "Contents of app/build/outputs/apk:" 
            find app/build/outputs/apk -type f -name '*.apk' 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          mkdir -p dist
          cp "$APK_PATH" "dist/CompilationMaker-${TAG_NAME}.apk"
          echo "apk_path=dist/CompilationMaker-${TAG_NAME}.apk" >> "$GITHUB_OUTPUT"

      - name: Fallback upload (ensures APK is attached)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "CompilationMaker $TAG" \
              --generate-notes \
              --latest
          else
            echo "Updating existing release $TAG"
          fi
          gh release upload "$TAG" "${{ steps.artifact.outputs.apk_path }}#CompilationMaker-${TAG}.apk" --clobber
          if [ $? -ne 0 ]; then
            echo "Failed to upload APK to release assets."
            exit 1
          fi
