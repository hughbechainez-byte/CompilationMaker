name: Release APK on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          ./gradlew :app:assembleDebug
          ./gradlew :app:assembleRelease

      - name: Locate APK artifact
        id: artifact
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_PATH="$(find app/build/outputs -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK not found in app/build/outputs"
            echo "Contents of app/build/outputs/apk:" 
            find app/build/outputs/apk -type f -name '*.apk' 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          mkdir -p dist
          cp "$APK_PATH" "dist/CompilationMaker-${TAG_NAME}.apk"
          echo "apk_path=dist/CompilationMaker-${TAG_NAME}.apk" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CompilationMaker ${{ github.ref_name }}"
          files: ${{ steps.artifact.outputs.apk_path }}
          generate_release_notes: true
          make_latest: "true"
          fail_on_unmatched_files: true

      - name: Fallback upload (ensures APK is attached)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${{ steps.artifact.outputs.apk_path }}" --clobber
          else
            echo "Release not yet published, cannot attach APK."
            exit 1
          fi
