name: Release APK on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          ./gradlew :app:assembleDebug

      - name: Stage versioned APK artifact
        id: artifact
        run: |
          mkdir -p dist
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK not found at expected path."
            exit 1
          fi
          cp "app/build/outputs/apk/debug/app-debug.apk" "dist/CompilationMaker-${TAG_NAME}.apk"
          echo "apk_path=dist/CompilationMaker-${TAG_NAME}.apk" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CompilationMaker ${{ github.ref_name }}"
          files: ${{ steps.artifact.outputs.apk_path }}
          generate_release_notes: true
          make_latest: "true"
          fail_on_unmatched_files: true
