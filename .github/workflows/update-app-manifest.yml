name: Update app-update.json on release

on:
  release:
    types: [published]

jobs:
  update-manifest:
    name: Write app-update.json from release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Determine latest APK asset
        id: discover
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          RAW_ASSETS='${{ toJson(github.event.release.assets) }}'
          APK_URL="$(printf '%s' "$RAW_ASSETS" | jq -r '.[] | select(((.name|test("\\.apk$"; "i")) or (.content_type=="application/vnd.android.package-archive")) and (.browser_download_url != null) | .browser_download_url' | head -n 1)"
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            APK_URL="$(printf '%s' "$RAW_ASSETS" | jq -r '.[] | select(.name | test("CompilationMaker"; "i")) | .browser_download_url' | head -n 1)"
          fi
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          RELEASE_URL="${{ github.event.release.html_url }}"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Update manifest file
        env:
          TAG: ${{ steps.discover.outputs.tag }}
          RELEASE_URL: ${{ steps.discover.outputs.release_url }}
          APK_URL: ${{ steps.discover.outputs.apk_url }}
          NOTE: ${{ github.event.release.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const https = require("https");

          const headers = {
            "User-Agent": "CompilationMaker-Manifest-Writer",
            "Accept": "application/vnd.github+json"
          };

          if (process.env.GITHUB_TOKEN) {
            headers["Authorization"] = `Bearer ${process.env.GITHUB_TOKEN}`;
          }

          function requestJson(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, { headers }, (res) => {
                let body = "";
                if (res.statusCode < 200 || res.statusCode >= 300) {
                  res.resume();
                  return reject(new Error(`Request failed: ${res.statusCode}`));
                }
                res.on("data", (chunk) => (body += chunk));
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(body || "[]"));
                  } catch (e) {
                    reject(e);
                  }
                });
              });
              req.on("error", reject);
            });
          }

          function pickApkUrl(assets) {
            if (!Array.isArray(assets) || assets.length === 0) {
              return "";
            }
            let fallbackNameMatch = "";
            let fallbackContentType = "";
            for (const asset of assets) {
              const name = (asset && asset.name) || "";
              const url = (asset && asset.browser_download_url) || (asset && asset.url) || "";
              if (!url) continue;
              if (name.endsWith(".apk")) {
                return url;
              }
              if (!fallbackNameMatch && /compilationmaker/i.test(name)) {
                fallbackNameMatch = url;
              }
              if (!fallbackContentType && (asset.content_type || "").toLowerCase() === "application/vnd.android.package-archive") {
                fallbackContentType = url;
              }
            }
            return fallbackNameMatch || fallbackContentType || "";
          }

          const repo = process.env.GH_REPO || "hughbechainez-byte/CompilationMaker";
          const releasesUrl = `https://api.github.com/repos/${repo}/releases?per_page=20`;

          const manifest = {
            version: process.env.TAG || "0.0.0",
            releaseUrl: process.env.RELEASE_URL || "",
            apk: { url: process.env.APK_URL || "" },
            notes: process.env.NOTE || "Release published.",
            updates: []
          };

          (async () => {
            try {
              const releases = await requestJson(releasesUrl);
              if (Array.isArray(releases)) {
                manifest.updates = releases
                  .map((r) => ({
                    version: r.tag_name || r.name || "",
                    releaseUrl: r.html_url || "",
                    apkUrl: pickApkUrl(r.assets || []),
                    notes: r.body || ""
                  }))
                  .filter((r) => r.version || r.apkUrl);
              }
            } catch (_) {
              manifest.updates = [{
                version: manifest.version,
                releaseUrl: manifest.releaseUrl,
                apkUrl: (manifest.apk && manifest.apk.url) || "",
                notes: manifest.notes
              }];
            }

            if (!Array.isArray(manifest.updates) || manifest.updates.length === 0) {
              manifest.updates = [{
                version: manifest.version,
                releaseUrl: manifest.releaseUrl,
                apkUrl: (manifest.apk && manifest.apk.url) || "",
                notes: manifest.notes
              }];
            }

            fs.writeFileSync("app-update.json", JSON.stringify(manifest, null, 2) + "\n");
          })();

          NODE

      - name: Commit and push manifest update
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          if git diff --quiet -- app-update.json; then
            echo "No manifest changes needed."
            exit 0
          fi
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add app-update.json
          git commit -m "chore: sync app-update.json for ${{ steps.discover.outputs.tag }}"
          git push
